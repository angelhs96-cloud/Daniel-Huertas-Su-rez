<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <h1>⚡ ATRAPA EL OBJECTO ⚡</h1>

    <!-- HUD: puntaje y vidas -->
    <div class="hud">
        <span>Puntaje: <strong id="puntaje">0</strong></span>
        <span id="vidas">❤️❤️❤️</span>
    </div>

    <!-- Canvas del juego -->
    <div style="position:relative;">

        <canvas id="gameCanvas" width="400" height="500"></canvas>

        <!-- Pantalla inicio / game over -->
        <div id="pantalla" style="
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 6px;
        ">
            <h2 id="overlay-titulo" style="color:#f59e0b; font-size:1.4rem;">¡ATRAPA EL OBJECTO!</h2>
            <p  id="overlay-texto"  style="color:#94a3b8; font-size:0.85rem; text-align:center;">
                Mueve el mouse para mover la paleta.<br>
                No dejes que la bola toque el suelo.<br>
                Tienes 3 vidas.
            </p>
            <button id="btnJugar" style="
                background: #ef4444;
                color: white;
                border: none;
                padding: 12px 30px;
                font-size: 1rem;
                font-weight: bold;
                border-radius: 6px;
                cursor: pointer;
            ">▶ JUGAR</button>
        </div>

    </div>

    <script src="javascript/script.js"></script>
</body>
</html>
